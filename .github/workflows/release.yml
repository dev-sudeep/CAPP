name: Release capp

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic Version (e.g. 1.0.0)'
        required: true
        type: string
        default: '1.0.0'

jobs:
  # ── Linux builds (native + cross via gcc multilib / cross toolchains) ──────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            cc: gcc
            cflags: -m64
          - arch: x86
            cc: gcc
            cflags: -m32
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            cflags: ""
          - arch: arm
            cc: arm-linux-gnueabihf-gcc
            cflags: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross-compilers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc \
            gcc-multilib \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf

      - name: Compile
        run: |
          ${{ matrix.cc }} ${{ matrix.cflags }} capp.c -o capp-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: capp-linux-${{ matrix.arch }}
          path: capp-linux-${{ matrix.arch }}

  # ── macOS builds (native x86_64 + cross-compile aarch64 via clang target) ──
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-macos10.15
          - arch: aarch64
            target: arm64-apple-macos11

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile
        run: |
          clang -target ${{ matrix.target }} capp.c -o capp-macos-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: capp-macos-${{ matrix.arch }}
          path: capp-macos-${{ matrix.arch }}

  # ── Windows builds (x86_64 native, aarch64 via LLVM/clang cross) ───────────
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            cc: gcc
            cflags: -m64
          - arch: aarch64
            cc: clang
            cflags: --target=aarch64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM (for aarch64 cross-compile)
        if: matrix.arch == 'aarch64'
        run: choco install llvm --yes

      - name: Compile
        shell: bash
        run: |
          ${{ matrix.cc }} ${{ matrix.cflags }} capp.c -o capp-windows-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: capp-windows-${{ matrix.arch }}
          path: capp-windows-${{ matrix.arch }}.exe

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts (debug)
        run: ls -lh artifacts/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Release v${{ inputs.version }}" \
            --notes "Automated release v${{ inputs.version }}" \
            artifacts/capp-linux-x86_64 \
            artifacts/capp-linux-x86 \
            artifacts/capp-linux-aarch64 \
            artifacts/capp-linux-arm \
            artifacts/capp-macos-x86_64 \
            artifacts/capp-macos-aarch64 \
            artifacts/capp-windows-x86_64.exe \
            artifacts/capp-windows-aarch64.exe
