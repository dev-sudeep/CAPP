name: Release capp

on:
  push:
    branches:
      - main
    paths:
      - 'capp.c'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic Version (e.g. 1.0.0)'
        required: true
        type: string
        default: '1.0.0'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile (Linux/macOS)
        if: runner.os != 'Windows'
        run: gcc capp.c -o capp-${{ runner.os }}

      - name: Compile (Windows)
        if: runner.os == 'Windows'
        run: gcc capp.c -o capp-${{ runner.os }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ runner.os }}
          path: capp-${{ runner.os }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            # Try to extract version from commit message, e.g., "v1.2.3" or "1.2.3"
            MSG="${{ github.event.head_commit.message }}"
            VERSION=$(echo "$MSG" | grep -oP 'v?\K[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || echo "")
            if [ -z "$VERSION" ]; then
              VERSION="1.0.${{ github.run_number }}"
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.VERSION }} \
            --title "Release v${{ env.VERSION }}" \
            --notes "Automated release" \
            artifacts/executable-*/*
