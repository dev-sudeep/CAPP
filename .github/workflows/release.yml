# ── Linux builds ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            cc: gcc
            cflags: -m64
            apt_pkgs: gcc libc6-dev
          - arch: x86
            cc: gcc
            cflags: -m32
            # Lightened down to avoid massive g++ multilib dependencies
            apt_pkgs: gcc-multilib libc6-dev-i386
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            cflags: ""
            # Added explicit cross libc headers
            apt_pkgs: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          - arch: arm
            cc: arm-linux-gnueabihf-gcc
            cflags: ""
            # Added explicit cross libc headers
            apt_pkgs: gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ matrix.arch }}-${{ hashFiles('**/capp.c') }}
          restore-keys: |
            ${{ runner.os }}-apt-${{ matrix.arch }}-

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          # --no-install-recommends cuts installation sizes in half by dropping documentation
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_pkgs }}

      - name: Compile
        run: |
          ${{ matrix.cc }} ${{ matrix.cflags }} capp.c -o capp-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: capp-linux-${{ matrix.arch }}
          path: capp-linux-${{ matrix.arch }}
